<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Speed Game</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 30%, #16213e 60%, #0f3460 100%);
  background-attachment: fixed;
  color: #fff;
  text-align: center;
  padding: 40px 20px;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 50%, rgba(255, 107, 107, 0.1), transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(107, 200, 255, 0.1), transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 800px;
  margin: auto;
  position: relative;
  z-index: 1;
}

header {
  margin-bottom: 50px;
  animation: slideDown 0.8s ease-out;
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  font-size: 3.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #1dd1a1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
  letter-spacing: -1px;
}

.subtitle {
  font-size: 1rem;
  color: rgba(255, 255, 255, 0.6);
  font-weight: 300;
  letter-spacing: 2px;
}

.game-card {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 24px;
  padding: 40px;
  margin-bottom: 30px;
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
  animation: fadeInUp 0.6s ease-out 0.2s both;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

#sentence {
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #fff;
  padding: 28px;
  border-radius: 16px;
  margin: 30px 0;
  font-size: 1.4rem;
  line-height: 2;
  letter-spacing: 0.5px;
  font-family: 'JetBrains Mono', monospace;
  min-height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  word-break: break-word;
  gap: 2px;
}

#sentence span {
  position: relative;
  display: inline-block;
  padding: 4px 2px;
  border-radius: 4px;
  transition: all 0.15s ease;
}

#sentence span:not(.correct):not(.wrong) {
  color: rgba(255, 255, 255, 0.7);
}

.correct {
  color: #1dd1a1;
  background: rgba(29, 209, 161, 0.15);
  font-weight: 600;
  box-shadow: 0 0 8px rgba(29, 209, 161, 0.3);
  animation: charMatch 0.3s ease;
}

@keyframes charMatch {
  0% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.15);
  }
  100% {
    transform: scale(1);
  }
}

.wrong {
  color: #ff6b6b;
  background: rgba(255, 107, 107, 0.2);
  font-weight: 600;
  box-shadow: 0 0 8px rgba(255, 107, 107, 0.4);
  animation: charError 0.4s ease;
}

@keyframes charError {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

.input-group {
  position: relative;
  margin: 25px 0;
}

#input {
  width: 100%;
  padding: 16px 20px;
  font-size: 1.1rem;
  border-radius: 12px;
  border: 2px solid rgba(255, 255, 255, 0.2);
  background: rgba(255, 255, 255, 0.08);
  color: #fff;
  font-family: 'JetBrains Mono', monospace;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

#input:focus {
  outline: none;
  border-color: #48dbfb;
  background: rgba(255, 255, 255, 0.12);
  box-shadow: 0 0 20px rgba(72, 219, 251, 0.3);
}

#input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

#input::placeholder {
  color: rgba(255, 255, 255, 0.4);
}

.button-group {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 30px 0;
}

button {
  padding: 14px 32px;
  font-size: 1rem;
  font-weight: 700;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-family: 'Poppins', sans-serif;
  text-transform: uppercase;
  letter-spacing: 1px;
  position: relative;
  overflow: hidden;
}

button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(255, 255, 255, 0.2);
  transition: left 0.3s ease;
  z-index: -1;
}

button:hover::before {
  left: 100%;
}

button:nth-child(1) {
  background: linear-gradient(135deg, #667eea, #764ba2);
  box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
}

button:nth-child(1):hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
}

button:nth-child(2) {
  background: linear-gradient(135deg, #f093fb, #f5576c);
  box-shadow: 0 10px 30px rgba(245, 87, 108, 0.3);
}

button:nth-child(2):hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 40px rgba(245, 87, 108, 0.5);
}

button:nth-child(3) {
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  color: #000;
  box-shadow: 0 10px 30px rgba(79, 172, 254, 0.3);
}

button:nth-child(3):hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 40px rgba(79, 172, 254, 0.5);
}

button:active {
  transform: translateY(-1px);
}

.stats-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 16px;
  margin-top: 35px;
}

.stat-box {
  background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.15));
  border: 1px solid rgba(102, 126, 234, 0.3);
  border-radius: 12px;
  padding: 20px;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

.stat-box:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
  border-color: rgba(102, 126, 234, 0.5);
}

.stat-label {
  font-size: 0.85rem;
  color: rgba(255, 255, 255, 0.6);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  font-weight: 600;
}

.stat-value {
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, #feca57, #48dbfb, #1dd1a1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

@media (max-width: 768px) {
  h1 {
    font-size: 2.5rem;
  }

  .game-card {
    padding: 25px;
  }

  #sentence {
    font-size: 1.1rem;
    padding: 20px;
  }

  button {
    padding: 12px 24px;
    font-size: 0.9rem;
  }

  .stats-container {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<div class="container">
  <header>
    <h1>⌨️ Speed Typer</h1>
    <p class="subtitle">Test Your Typing Skills</p>
  </header>

  <div class="game-card">
    <div id="sentence"></div>

    <div class="input-group">
      <input type="text" id="input" placeholder="Click 'Start' and begin typing..." disabled>
    </div>

    <div class="button-group">
      <button onclick="startGame()">Start</button>
      <button onclick="restartGame()">Restart</button>
      <button onclick="newSentence()">New Sentence</button>
    </div>

    <div class="stats-container">
      <div class="stat-box">
        <div class="stat-label">⏱ Time</div>
        <div class="stat-value"><span id="time">0</span>s</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">⚡ WPM</div>
        <div class="stat-value"><span id="wpm">0</span></div>
      </div>
      <div class="stat-box">
        <div class="stat-label">🎯 Accuracy</div>
        <div class="stat-value"><span id="accuracy">100</span>%</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">❌ Mistakes</div>
        <div class="stat-value"><span id="mistakes">0</span></div>
      </div>
    </div>
  </div>
</div>

<script>
// Enhanced sentences array with more variety
const sentences = [
  "The quick brown fox jumps over the lazy dog.",
  "JavaScript is a powerful programming language.",
  "Practice typing daily to improve your speed.",
  "Coding is fun when you understand the logic.",
  "Always write clean and readable code.",
  "Consistency is the key to success.",
  "Web development is an exciting field.",
  "Type faster with every single keystroke.",
  "Speed typing improves focus and concentration.",
  "Your fingers will thank you for practicing."
];

let currentSentence = "";
let timer = null;
let time = 0;
let mistakes = 0;
let started = false;

// Load random sentence
function loadSentence() {
  currentSentence = sentences[Math.floor(Math.random() * sentences.length)];
  let html = "";
  currentSentence.split("").forEach(char => {
    html += `<span>${char}</span>`;
  });
  document.getElementById("sentence").innerHTML = html;
}

// Start Game
function startGame() {
  document.getElementById("input").disabled = false;
  document.getElementById("input").value = "";
  document.getElementById("input").focus();

  time = 0;
  mistakes = 0;
  started = false;

  document.getElementById("time").innerText = 0;
  document.getElementById("mistakes").innerText = 0;
  document.getElementById("wpm").innerText = 0;
  document.getElementById("accuracy").innerText = 100;

  loadSentence();
}

// Restart Game
function restartGame() {
  clearInterval(timer);
  document.getElementById("input").value = "";
  document.getElementById("input").disabled = true;
  document.getElementById("time").innerText = 0;
  document.getElementById("wpm").innerText = 0;
  document.getElementById("accuracy").innerText = 100;
  document.getElementById("mistakes").innerText = 0;
  started = false;
  time = 0;
  mistakes = 0;
  loadSentence();
}

// New Sentence
function newSentence() {
  loadSentence();
}

// Typing logic
document.getElementById("input").addEventListener("input", function() {

  if (!started) {
    started = true;
    timer = setInterval(() => {
      time++;
      document.getElementById("time").innerText = time;
    }, 1000);
  }

  let input = this.value;
  let chars = document.querySelectorAll("#sentence span");

  let correct = 0;
  mistakes = 0;

  chars.forEach((char, index) => {
    if (input[index] == null) {
      char.classList.remove("correct", "wrong");
    }
    else if (input[index] === char.innerText) {
      char.classList.add("correct");
      char.classList.remove("wrong");
      correct++;
    } else {
      char.classList.add("wrong");
      char.classList.remove("correct");
      mistakes++;
    }
  });

  // Update mistakes
  document.getElementById("mistakes").innerText = mistakes;

  // Accuracy
  let accuracy = Math.round((correct / input.length) * 100) || 0;
  document.getElementById("accuracy").innerText = accuracy;

  // WPM Calculation
  let wpm = Math.round((correct / 5) / (time / 60)) || 0;
  document.getElementById("wpm").innerText = wpm;

  // Game Complete
  if (input === currentSentence) {
    clearInterval(timer);
    setTimeout(() => {
      alert("🎉 Awesome! You Completed It!\n\nWPM: " + wpm + "\nAccuracy: " + accuracy + "%\n\nGreat job! 🚀");
    }, 300);
  }
});

// Load initial sentence
loadSentence();

</script>

</body>
</html>
